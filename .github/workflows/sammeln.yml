name: Bahnpolitik sammeln

on:
  schedule:
    # täglich 04:30 UTC (06:30 MESZ / 05:30 MEZ)
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sammeln:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install requests openpyxl

      - name: DIP-Daten abrufen
        env:
          DIP_API_KEY: ${{ secrets.DIP_API_KEY }}
        run: python bahnpolitik_dip.py

      - name: Ergebnisse committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bahnpolitik.sqlite bahnpolitik_gesamt.xlsx
          if git diff --staged --quiet; then
            echo "Keine Änderungen – nichts zu committen."
          else
            git commit -m "Datenlauf $(date -u +%Y-%m-%d)"
            git push
          fi
